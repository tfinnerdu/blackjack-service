# Render blueprint: one web service + one Postgres database.
# Push to the connected branch and Render builds + deploys automatically.
services:
  - type: web
    name: blackjack-service
    runtime: python
    plan: free
    branch: main
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      cd client && npm ci && npm run build
      # Migrations infra is in place (`flask db upgrade`) but not auto-run
      # in the build yet — see docs/MIGRATIONS.md. Run `flask db stamp head`
      # on the existing Render Postgres once, then re-enable this line.
    startCommand: gunicorn -k gthread --threads 4 -w 1 -b 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: blackjack-db
          property: connectionString

databases:
  - name: blackjack-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
