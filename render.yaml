# Render blueprint: one web service + one Postgres database.
# Push to the connected branch and Render builds + deploys automatically.
services:
  - type: web
    name: blackjack-service
    runtime: python
    plan: free
    branch: main
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      cd client && npm ci && npm run build
    startCommand: gunicorn -k eventlet -w 1 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: blackjack-db
          property: connectionString

databases:
  - name: blackjack-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
