<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="Card Trainer">
  <!-- Felt-green background, rounded square (PWA install treatment varies). -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#073a23"/>

  <!-- Off-white playing card centered, slight tilt for visual interest. -->
  <g transform="rotate(-8 256 256)">
    <rect x="116" y="84" width="280" height="344" rx="28" ry="28"
          fill="#f5f5f1" stroke="#0c2a1d" stroke-width="6"/>
    <!-- Big spade pip in the middle. -->
    <path d="M256 168
             C 220 220, 168 252, 168 296
             C 168 326, 192 348, 220 348
             C 240 348, 252 336, 256 320
             C 260 336, 272 348, 292 348
             C 320 348, 344 326, 344 296
             C 344 252, 292 220, 256 168 Z"
          fill="#0c2a1d"/>
    <!-- Stem under the spade. -->
    <path d="M244 348 L268 348 L274 380 L238 380 Z"
          fill="#0c2a1d"/>
    <!-- Top-left rank. -->
    <text x="148" y="138" font-family="Georgia, 'Times New Roman', serif"
          font-size="48" font-weight="700" fill="#0c2a1d">A</text>
    <!-- Bottom-right rank, rotated. -->
    <g transform="translate(364 396) rotate(180)">
      <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
            font-size="48" font-weight="700" fill="#0c2a1d">A</text>
    </g>
  </g>
</svg>
